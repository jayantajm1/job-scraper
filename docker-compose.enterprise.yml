services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      - JOB_DATA_DIR=/app/data
      - PYTHONIOENCODING=utf-8
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://jobscraper:jobscraper@postgres:5432/jobscraper
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - job_data:/app/data
    expose:
      - "5000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "celery", "-A", "worker.celery_app", "worker", "--loglevel=info"]
    env_file:
      - .env.production
    environment:
      - JOB_DATA_DIR=/app/data
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://jobscraper:jobscraper@postgres:5432/jobscraper
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - job_data:/app/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=jobscraper
      - POSTGRES_PASSWORD=jobscraper
      - POSTGRES_DB=jobscraper
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobscraper"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  job_data:
  pg_data:
