services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-scraper-backend
    env_file:
      - .env.production
    environment:
      - JOB_DATA_DIR=/app/data
      - PYTHONIOENCODING=utf-8
    volumes:
      - job_data:/app/data
    expose:
      - "5000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job-scraper-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  default:
    name: job-scraper-network

volumes:
  job_data:
