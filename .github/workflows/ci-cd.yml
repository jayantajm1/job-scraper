name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: |
          python -m py_compile api_server.py dotnet_job_scraper.py apply_jobs.py auto_apply.py

      - name: Security audit (Python)
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Security audit (Node)
        working-directory: frontend
        run: npm audit --audit-level=high || true

  docker-build:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t job-scraper-backend:ci .

      - name: Build frontend image
        run: docker build -t job-scraper-frontend:ci ./frontend

  deploy-placeholder:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Deployment note
        run: |
          echo "Add your deployment credentials and remote steps here"
          echo "Example: ssh to server, git pull, docker compose -f docker-compose.prod.yml up -d --build"
